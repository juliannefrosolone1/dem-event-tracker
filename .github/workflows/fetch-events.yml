name: Fetch Candidate Events

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

jobs:
  fetch-events:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic

      - name: Run event fetcher
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/fetch_events.py

      - name: Commit updated events data
        run: |
          git config --global user.name "Events Bot"
          git config --global user.email "eventsbot@github-actions"
          git add public/events.json
          git diff --staged --quiet || git commit -m "chore: update events data [$(date +'%Y-%m-%d')]"
          git push
